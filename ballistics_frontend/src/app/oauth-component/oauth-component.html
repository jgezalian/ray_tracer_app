@if (getAuth()) {
  <div class="container authenticated">
    <app-input-form-component (rendered)="list.listRenders()"></app-input-form-component>
    <app-list-renders-component #list></app-list-renders-component>
    Logged in as: <span id="user">{{ getUser().getName() }}</span>
    <button (click)="logout()">logout</button>
  </div>
} @else {
  <div class="container unauthenticated">
    Login with Google: <a href="http://localhost:8080/oauth2/authorization/google">click here</a>
  </div>
}
