<div class="form_container">
  <h1>input params</h1>
  <form (ngSubmit)="onSubmit(inputForm)" #inputForm="ngForm">
    <div class="form-group">
      <label for="v_x">x velocity</label>
      <input
        type="number"
        step="any"
        class="form-control"
        id="v_x"
        required
        [(ngModel)]="model.vX"
        name="v_x"
        #v_x="ngModel"
      />
    </div>
    <div class="form-group">
      <label for="v_y">y velocity</label>
      <input
        type="number"
        step="any"
        class="form-control"
        id="v_y"
        required
        [(ngModel)]="model.vY"
        name="v_y"
        #v_y="ngModel"
      />
    </div>
    <div class="form-group">
      <label for="v_z">z velocity</label>
      <input
        type="number"
        step="any"
        class="form-control"
        id="v_z"
        required
        [(ngModel)]="model.vZ"
        name="v_z"
        #v_z="ngModel"
      />
    </div>
    <button type="submit">Render</button>
  </form>

  @if (!renderService.videoLoaded()) {
    <p>rendering video...</p>
  }
</div>
