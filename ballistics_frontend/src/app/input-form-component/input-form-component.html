<div class="form_container">
  <h1>input params</h1>
  <form (ngSubmit)="onSubmit(inputForm)" #inputForm="ngForm">
    <div class="form-group">
      <label for="v_x">v_x</label>
      <input
        type="number"
        step="any"
        class="form-control"
        id="v_x"
        required
        [(ngModel)]="model.v_x"
        name="v_x"
        #v_x="ngModel"
      />
    </div>
    <div class="form-group">
      <label for="v_y">v_y</label>
      <input
        type="number"
        step="any"
        class="form-control"
        id="v_y"
        required
        [(ngModel)]="model.v_y"
        name="v_y"
        #v_y="ngModel"
      />
    </div>
    <button type="submit">Render</button>
  </form>
</div>
