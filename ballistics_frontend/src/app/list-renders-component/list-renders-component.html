<div id="renders">
  @if (renderService.listLoading()) {
    <p>loading previous renders...</p>
  } @else if (renderService.listError()) {
    <p>{{ renderService.listError() }}</p>
  } @else {
    @for (video of renderService.videoUrls(); track video.id) {
      <app-render-component [vid_src]="video.url" [vid_id]="video.id"></app-render-component>
    }
  }
</div>
